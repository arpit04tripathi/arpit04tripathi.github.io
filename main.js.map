<div class="row bg-dark text-white mb-3 justify-content-center align-self-center">
  <div class="col-sm-2 container-fluid">
    <p class="p-auto"><ng-content select=".my-img"></ng-content></p>
  </div>
  <div class="col-sm-8">
    <div >
        <h4 class="card-title text-white">
            <ng-content select=".title"></ng-content>
          </h4>
          <p class="card-text">
            <ng-content select=".major"></ng-content>
          </p>
          <p>
            <ng-content select=".inst"></ng-content>
          </p>
        </div>    
  </div>
  <div class="col-sm-2 bg-success">
    <div class="text-center d-flex flex-wrap align-content-center">
        <div><h3 class="card-text text-white"><ng-content select=".score"></ng-content></h3></div>
    </div>
  </div>
</div>
