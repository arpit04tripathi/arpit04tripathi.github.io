<div>
  <h2>Educational Qaualification</h2>
  <hr><br>
  <div class="row">
    <app-qualification-card class="w-100" *ngFor="let item of education">
      <p class="my-img"><img src={{item.img}} alt="SGSITS, Indore" class="w-100"></p>
      <p class="title">{{item.title}}</p>
      <p class="major">{{item.major}}</p>
      <p class="inst">{{item.inst}}</p>
      <p class="score">{{item.score}}</p>
    </app-qualification-card>
  </div>
</div>
