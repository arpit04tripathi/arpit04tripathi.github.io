<div class="row bg-dark text-white mb-2">
  <div class="col-sm-2 d-flex">
      <ng-content select=".my-img" class="align-self-center"></ng-content>
  </div>
  <div class="col-sm-8 d-flex">
    <div class="align-self-center">
      <h4 class="card-title text-white">
        <ng-content select=".title"></ng-content>
      </h4>
      <p class="card-text">
        <ng-content select=".major"></ng-content>
      </p>
      <p>
        <ng-content select=".inst"></ng-content>
      </p>
    </div>
  </div>
  <div class="col-sm-2 bg-success d-flex">
    <div class="align-self-center text-center">
      <h3 class="card-text text-white">
        <ng-content select=".score"></ng-content>
      </h3>
    </div>
  </div>
</div>
